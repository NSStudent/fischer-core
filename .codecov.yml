coverage:
  ignore:
    - Tests/**        # Excluye la carpeta de tests de los cálculos de cobertura
  status:
    project:
      default:
        target: 80%  # Define que la cobertura debe ser al menos del 80%
        threshold: 0% # No permite bajar del 80%
        base: auto    # Compara con la cobertura anterior automáticamente
        paths:
          - Sources/
    patch:
      default:
        target: 80%
        threshold: 0%
        paths:
          - Sources/
